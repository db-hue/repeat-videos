<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repeat Videos — Listen on Repeat</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Auth0 SPA SDK (PKCE — no client secret in the browser) -->
  <script src="https://unpkg.com/@auth0/auth0-spa-js@2.1.3/dist/auth0-spa-js.production.js"></script>
  <style>
    :root {
      --bg0: #08080f;
      --bg1: #111118;
      --bg2: #1a1a26;
      --bg3: #24243a;
      --accent: #1a9fff;
      --accent2: #00d4ff;
      --green: #22c55e;
      --red: #ef4444;
      --text: #f0f0fa;
      --muted: #8888aa;
      --border: #2a2a42;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg0);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0f0f1e 0%, #14142a 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      height: 48px;
      width: 48px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .tagline {
      color: var(--muted);
      font-size: 0.85rem;
      flex: 1;
    }

    /* ── Auth area ── */
    .auth-area {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .btn-signin {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 18px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-signin:hover { background: #6b5ce7; }

    .signin-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 210px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .signin-dropdown.hidden { display: none; }
    .dropdown-label {
      font-size: 0.73rem;
      color: var(--muted);
      padding: 2px 4px 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .btn-provider {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-provider:hover { border-color: var(--accent); background: rgba(124,106,247,0.1); }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      object-fit: cover;
      flex-shrink: 0;
    }
    .user-avatar-fallback {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: var(--bg3);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .user-name {
      font-size: 0.88rem;
      font-weight: 500;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-signout {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-signout:hover { border-color: var(--red); color: var(--red); }

    /* ── Layout ── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    /* ── Input bar ── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    .url-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 18px;
      font-size: 0.95rem;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-input:focus { border-color: var(--accent); }
    .url-input::placeholder { color: var(--muted); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 13px 26px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-primary:hover { background: #6b5ce7; }
    .btn-primary:active { transform: scale(0.97); }

    /* ── Player card ── */
    .player-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-bottom: 28px;
    }
    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      border-radius: 20px 20px 0 0;
      overflow: hidden;
    }
    #yt-player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      background: #000;
    }
    .placeholder .big-icon { font-size: 3.5rem; }
    .placeholder p { font-size: 0.9rem; }

    /* ── Player controls bar ── */
    .player-meta {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .vid-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .badge b { color: var(--accent2); }

    .btn-sm {
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      border: 1px solid;
      white-space: nowrap;
    }
    .btn-loop {
      border-color: var(--accent);
      color: var(--accent);
      background: transparent;
    }
    .btn-loop.on {
      background: var(--accent);
      color: #fff;
    }

    .btn-playlist {
      border-color: var(--border);
      color: var(--muted);
      background: transparent;
      opacity: 0.45;
      cursor: default;
    }
    .btn-playlist.active {
      border-color: #f59e0b;
      color: #f59e0b;
      opacity: 1;
      cursor: pointer;
    }
    .btn-playlist.on {
      background: #f59e0b;
      border-color: #f59e0b;
      color: #000;
      opacity: 1;
      cursor: pointer;
    }

    /* ── Playlist Tracklist Panel ── */
    .playlist-panel {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-top: 12px;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.2s;
    }
    .playlist-panel.hidden {
      display: none;
    }
    .playlist-panel-header {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .playlist-panel-info {
      flex: 1;
      min-width: 0;
    }
    #plPanelTitle {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #plPanelCount {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .playlist-panel-chevron {
      font-size: 0.75rem;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .playlist-panel.collapsed .playlist-panel-chevron {
      transform: rotate(-90deg);
    }
    .playlist-panel-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
    }
    .playlist-panel-close:hover {
      color: var(--text);
      background: var(--bg3);
    }
    .playlist-tracks {
      max-height: 300px;
      overflow-y: auto;
      transition: max-height 0.25s ease;
    }
    .playlist-panel.collapsed .playlist-tracks {
      max-height: 0;
      overflow: hidden;
    }
    .pl-track {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .pl-track:hover {
      background: var(--bg2);
    }
    .pl-track.active {
      background: rgba(26, 159, 255, 0.10);
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }
    .pl-track-num {
      font-size: 0.75rem;
      color: var(--muted);
      width: 22px;
      text-align: right;
      flex-shrink: 0;
    }
    .pl-track.active .pl-track-num {
      color: var(--accent);
      font-weight: 700;
    }
    .pl-track-thumb {
      width: 60px;
      height: 34px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg3);
    }
    .pl-track-title {
      flex: 1;
      font-size: 0.82rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .pl-track-title.loading {
      color: var(--muted);
      font-style: italic;
    }
    /* Custom scrollbar for playlist tracks */
    .playlist-tracks::-webkit-scrollbar {
      width: 6px;
    }
    .playlist-tracks::-webkit-scrollbar-track {
      background: transparent;
    }
    .playlist-tracks::-webkit-scrollbar-thumb {
      background: var(--bg3);
      border-radius: 3px;
    }
    .playlist-tracks::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }
    @media (max-width: 580px) {
      .playlist-tracks {
        max-height: 200px;
      }
      .pl-track-thumb {
        width: 48px;
        height: 27px;
      }
      .pl-track {
        padding: 6px 12px;
        gap: 8px;
      }
      .pl-track.active {
        padding-left: 9px;
      }
    }

    /* ── A/B Loop Bar ── */
    .ab-bar-wrap {
      padding: 0 20px 16px;
    }
    .ab-bar {
      position: relative;
      height: 46px;
      background: var(--bg3);
      border-radius: 6px;
      cursor: crosshair;
      user-select: none;
    }
    .ab-range {
      position: absolute;
      inset: 0;
      background: rgba(26, 159, 255, 0.18);
      border-top: 2px solid rgba(26, 159, 255, 0.5);
      border-bottom: 2px solid rgba(26, 159, 255, 0.5);
      pointer-events: none;
      border-radius: 6px;
    }
    .ab-playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(255, 255, 255, 0.75);
      pointer-events: none;
      border-radius: 1px;
      left: 0;
    }
    .ab-handle {
      position: absolute;
      top: -4px;
      bottom: -4px;
      width: 24px;
      transform: translateX(-50%);
      cursor: ew-resize;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .ab-handle::before,
    .ab-handle::after {
      content: '';
      width: 3px;
      height: 65%;
      background: var(--accent2);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .ab-handle:hover::before,
    .ab-handle:hover::after { background: #fff; }
    .ab-times {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-size: 0.71rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      padding: 0 2px;
    }

    /* ── Library ── */
    .lib-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .lib-title {
      font-size: 1.05rem;
      font-weight: 700;
    }
    .btn-danger-ghost {
      border: 1px solid var(--red);
      color: var(--red);
      background: transparent;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-danger-ghost:hover { background: var(--red); color: #fff; }

    .btn-reload-ghost {
      border: 1px solid var(--accent);
      color: var(--accent);
      background: transparent;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-right: 8px;
    }
    .btn-reload-ghost:hover { background: var(--accent); color: #fff; }

    .sort-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .sort-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .sort-btn:hover { border-color: var(--accent); color: var(--text); }
    .sort-btn.active { background: rgba(26,159,255,0.12); border-color: var(--accent); color: var(--accent); }

    .songs { display: flex; flex-direction: column; gap: 8px; }

    .song-row {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .song-row:hover { border-color: var(--accent); }
    .song-row.active {
      border-color: var(--accent);
      background: rgba(26, 159, 255, 0.12);
    }
    .thumb {
      width: 72px;
      height: 54px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--bg3);
      flex-shrink: 0;
    }
    .song-info { flex: 1; min-width: 0; }
    .song-name {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-date {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .loop-count {
      text-align: right;
      flex-shrink: 0;
    }
    .loop-count .num {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent2);
    }
    .loop-count .lbl {
      font-size: 0.7rem;
      color: var(--muted);
      display: block;
    }
    .btn-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s;
    }
    .btn-del:hover { color: var(--red); }
    .btn-playlist-lib {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s;
    }
    .btn-playlist-lib:hover { color: var(--accent); }
    .playlist-lib-label {
      font-size: 0.7rem;
      display: block;
      line-height: 1;
      margin-top: 2px;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 44px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 2.8rem; margin-bottom: 10px; }
    .empty p { font-size: 0.9rem; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 22px;
      right: 22px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 0.85rem;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      header { gap: 10px; padding: 12px 16px; }
      .tagline { display: none; }
      .logo { font-size: 1.3rem; }
      .logo-icon { height: 36px; width: 36px; }
      .auth-area { margin-left: auto; }
      .input-row { flex-direction: column; }
      .player-meta { gap: 8px; }
      .vid-title { order: -1; width: 100%; }
      .user-name { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><img src="logo.svg" alt="Logo" class="logo-icon"> REPEAT VIDEOS</div>
  <div class="tagline">YouTube videos, on infinite repeat</div>
  <div class="auth-area" id="authArea">
    <!-- Filled by initAuth() -->
  </div>
</header>

<div class="container">

  <!-- URL Input -->
  <div class="input-row">
    <input id="urlInput" class="url-input"
           placeholder="Paste a YouTube URL or video ID and press Enter…"
           autocomplete="off" spellcheck="false" />
    <button class="btn-primary" id="playBtn">▶ Play</button>
  </div>

  <!-- Player -->
  <div class="player-card">
    <div class="video-wrap">
      <div id="placeholder" class="placeholder">
        <div class="big-icon">🎵</div>
        <p>Paste a YouTube link above to start listening on repeat</p>
      </div>
      <div id="yt-player"></div>
    </div>

    <!-- A/B Loop Timeline -->
    <div class="ab-bar-wrap">
      <div class="ab-bar" id="abBar">
        <div class="ab-range"    id="abRange"></div>
        <div class="ab-playhead" id="abPlayhead"></div>
        <div class="ab-handle"   id="handleA"></div>
        <div class="ab-handle"   id="handleB"></div>
      </div>
      <div class="ab-times">
        <span id="abTimeA">0:00</span>
        <span id="abTimeB">—</span>
      </div>
    </div>

    <div class="player-meta">
      <div class="vid-title" id="vidTitle">No video selected</div>
      <div class="badge">Session &nbsp;<b id="sessCount">0</b>&nbsp;counter</div>
      <div class="badge">Total &nbsp;<b id="totalCount">0</b>&nbsp;counter</div>
      <button class="btn-sm btn-loop on" id="loopBtn">🔁 Loop ON</button>
      <button class="btn-sm btn-playlist" id="playlistBtn" title="Paste a playlist URL to enable">▶ Playlist</button>
    </div>
  </div>

  <!-- Playlist Tracklist Panel -->
  <div class="playlist-panel hidden" id="playlistPanel">
    <div class="playlist-panel-header" id="plPanelHeader">
      <div class="playlist-panel-info">
        <div id="plPanelTitle">Playlist</div>
        <div id="plPanelCount">0 tracks</div>
      </div>
      <span class="playlist-panel-chevron">▼</span>
      <button class="playlist-panel-close" id="plPanelClose">✕</button>
    </div>
    <div class="playlist-tracks" id="playlistTracks"></div>
  </div>

  <!-- Library -->
  <div class="lib-header">
    <div class="lib-title">📚 My History </div>
  </div>
  <div class="sort-bar" id="sortBar" style="display:none;">
    <button class="sort-btn active" data-sort="recent">Recent</button>
    <button class="sort-btn" data-sort="most-played">Most played</button>
    <button class="sort-btn" data-sort="title">Title A-Z</button>
  </div>
  <div class="songs" id="songs"></div>
  <div class="lib-footer" id="libFooter" style="display:none; text-align:center; padding:12px 0 20px;">
    <button id="libRefreshBtn" onclick="manualLibRefresh()" title="Refresh library" style="display:none; background:none; border:1px solid rgba(255,255,255,.15); border-radius:6px; color:#aaa; cursor:pointer; font-size:1rem; padding:4px 10px; margin-right:8px; transition:color .2s">🔄</button>
    <button class="btn-reload-ghost" id="reloadBtn" title="Reload history from server">Reload history</button>

// ── API helper ────────────────────────────────────────────────────────────
async function getToken() {
  accessToken = await (auth0Client.getAccessTokenSilently?.() ?? auth0Client.getTokenSilently?.());
  return accessToken;
}

async function api(method, body) {
  const token = await getToken();
  const opts = {
    method,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_URL, opts);
  if (!res.ok) {
    const detail = await res.text().catch(() => '');
    console.error(`API ${res.status}:`, detail);
    throw new Error(`API ${res.status}`);
  }
  return res.json();
}

// ── Storage abstraction ────────────────────────────────────────────────────

const LAST_PLAYED_KEY = 'repeat-videos_last';

function loadLib() {

// ── Atlas sync ───────────────────────────────────────────────────────────────
async function loadLibraryFromAtlas(retries = 2) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const entries = await api('GET');
      if (!Array.isArray(entries)) throw new Error('Invalid response from server');
      serverLibCache = {};
      for (const e of entries) {
        serverLibCache[e.videoId] = {
          title:   e.title,
          loops:   e.loops || 0,
          addedAt: new Date(e.addedAt).getTime(),
          lastPlayedAt: e.lastPlayedAt ? new Date(e.lastPlayedAt).getTime() : null,
          loopA:   e.loopA ?? null,
          loopB:   e.loopB ?? null,
          playlistId: e.playlistId ?? null,
        };
      }
      lastLibRefresh = Date.now();
      renderLib();
      return;
    } catch (err) {
      console.error(`Library load attempt ${attempt + 1} failed:`, err);
      if (attempt === retries) {
        serverLibCache = null;
        toast('⚠️ Could not load library.');
        throw err;
      }
      await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
    }
  }
}

async function importFromLocalStorage() {
  const local = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
  const count = Object.keys(local).length;
  if (!count) return;

  // Import videos not already on the server; merge loops for existing ones
  const toImport = Object.entries(local).filter(([id]) => !serverLibCache[id]);
  const toMerge  = Object.entries(local).filter(([id]) => serverLibCache[id]);

  // Merge local play counts and lastPlayedAt into existing server entries
  for (const [videoId, s] of toMerge) {
    const srv = serverLibCache[videoId];
    const localPlayed = s.lastPlayedAt || s.addedAt || 0;
    const srvPlayed   = srv.lastPlayedAt || srv.addedAt || 0;
    if (localPlayed > srvPlayed) {
      srv.lastPlayedAt = localPlayed;
      api('PATCH', { videoId, lastPlayedAt: new Date(localPlayed).toISOString() }).catch(() => {});
    }
  }

  if (!toImport.length) {
    localStorage.removeItem(STORE_KEY);
    if (toMerge.length) renderLib();
    return;
  }

  let imported = 0;
  const failed = {};
  for (const [videoId, s] of toImport) {
    try {
      const _addedAt = s.addedAt || Date.now();
      const _lastPlayed = s.lastPlayedAt || _addedAt;
      await api('POST', {
        videoId,
        title:   s.title || 'Unknown',
        loops:   s.loops || 0,
        addedAt: new Date(_addedAt).toISOString(),
        lastPlayedAt: new Date(_lastPlayed).toISOString(),
        loopA:   s.loopA ?? null,
        loopB:   s.loopB ?? null,
        playlistId: s.playlistId ?? null,
      });
      serverLibCache[videoId] = {
        title: s.title || 'Unknown', loops: s.loops || 0, addedAt: _addedAt,
        lastPlayedAt: _lastPlayed,
        loopA: s.loopA ?? null, loopB: s.loopB ?? null, playlistId: s.playlistId ?? null,
      };
      imported++;
    } catch (_) {
      failed[videoId] = s;   // keep failed videos for retry
    }
  }

  if (Object.keys(failed).length) {
    localStorage.setItem(STORE_KEY, JSON.stringify(failed));
  } else {
    localStorage.removeItem(STORE_KEY);
  }

  if (imported > 0) {
    renderLib();
    toast(`✅ Imported ${imported} video${imported === 1 ? '' : 's'}!`);
  }
}

// ── Auth init ──────────────────────────────────────────────────────────────
async function initAuth() {
  try {
    // Support both auth0-spa-js v1 (flat) and v2 (authorizationParams)
    auth0Client = await auth0.createAuth0Client({
      domain:           AUTH0_DOMAIN,
      clientId:         AUTH0_CLIENT_ID,
      client_id:        AUTH0_CLIENT_ID,
      audience:         API_AUDIENCE,
      redirect_uri:     window.location.origin,
      cacheLocation:    'localstorage',
      useRefreshTokens: true,
      authorizationParams: {
        redirect_uri: window.location.origin,
        audience:     API_AUDIENCE,
      },
    });

    // Handle redirect back from Auth0
    if (location.search.includes('code=') && location.search.includes('state=')) {
      await auth0Client.handleRedirectCallback();
      history.replaceState({}, document.title, '/');
    }

    const isLoggedIn = await auth0Client.isAuthenticated();
    if (isLoggedIn) {
      currentUser = await auth0Client.getUser();
      showUserInfo(currentUser);

      // Track login — best-effort, fire and forget
      api('PUT', {
        action: 'track_login',
        name: currentUser.name,
        email: currentUser.email,
        picture: currentUser.picture,
      }).catch(err => console.warn('Login tracking failed:', err));

      // Backend sync — best-effort; failure falls back to localStorage
      try {
        await loadLibraryFromAtlas();
        startPolling();
        await importFromLocalStorage();
      } catch (syncErr) {
        console.error('Backend sync failed, falling back to localStorage:', syncErr);
        serverLibCache = null;
        renderLib();
        toast('⚠️ Cloud sync unavailable — library stored locally.');
      }
      tryAutoPlay();
    } else {
      showLoginButtons();
      renderLib();
      tryAutoPlay();
    }
  } catch (err) {
    console.error('Auth init error:', err);
    showGuestUI();
    renderLib();
    tryAutoPlay();
  }
}

// ── YouTube ID extractors ──────────────────────────────────────────────────
function extractId(raw) {
  raw = (raw || '').trim();
  if (/^[A-Za-z0-9_-]{11}$/.test(raw)) return raw;
  const pats = [
    /[?&]v=([A-Za-z0-9_-]{11})/,
    /youtu\.be\/([A-Za-z0-9_-]{11})/,
    /youtube\.com\/(?:embed|v|shorts)\/([A-Za-z0-9_-]{11})/,
  ];
  for (const p of pats) {
    const m = raw.match(p);
    if (m) return m[1];
  }
  return null;
}

function extractPlaylistId(raw) {
  const m = (raw || '').match(/[?&]list=([A-Za-z0-9_-]+)/);
  return m ? m[1] : null;
}

function updatePlaylistBtn() {

    btn.classList.remove('active', 'on');
    btn.textContent = '▶ Playlist';

    return;
  }
  btn.classList.add('active');
  btn.classList.toggle('on', playlistMode);
  btn.textContent = playlistMode ? '▶ Playlist ON' : '▶ Playlist OFF';
  btn.title = playlistMode ? 'Click to switch to loop mode' : 'Click to enable playlist mode';
}

// ── Playlist Tracklist Panel ────────────────────────────────────────────────
async function fetchVideoTitle(id) {
  if (plTitleCache[id]) return plTitleCache[id];
  try {
    const r = await fetch('https://noembed.com/embed?url=https://www.youtube.com/watch?v=' + id);
    const j = await r.json();
    if (j.title) { plTitleCache[id] = j.title; return j.title; }
  } catch (_) {}
  return null;
}

async function fetchTitlesBatch(ids, currentIndex) {
  // Prioritize titles near the current track
  const sorted = [...ids].sort((a, b) => {
    const ai = ids.indexOf(a), bi = ids.indexOf(b);
    return Math.abs(ai - currentIndex) - Math.abs(bi - currentIndex);
  });
  for (let i = 0; i < sorted.length; i += 5) {
    const batch = sorted.slice(i, i + 5);
    await Promise.all(batch.map(id => fetchVideoTitle(id)));
    renderPlaylistTracks();
  }
}

function showPlaylistPanel() {
  document.getElementById('playlistPanel').classList.remove('hidden');
}

function hidePlaylistPanel() {
  document.getElementById('playlistPanel').classList.add('hidden');
}

function togglePlaylistPanel() {
  const panel = document.getElementById('playlistPanel');
  if (panel.classList.contains('hidden')) {
    showPlaylistPanel();
  } else {
    plCollapsed = !plCollapsed;
    panel.classList.toggle('collapsed', plCollapsed);
  }
}

function closePlaylistPanel() {
  hidePlaylistPanel();
}

function buildPlaylistTracks(retries) {
  retries = retries || 0;
  try {
    const ids = player.getPlaylist();
    if (!ids || !ids.length) {
      // Playlist data not ready yet — retry up to 10 times (every 500ms)
      if (retries < 10) setTimeout(() => buildPlaylistTracks(retries + 1), 500);
      return;
    }
    plTracks = ids.map(id => ({ id, title: plTitleCache[id] || null }));
    plBuilt = true;
    // Cache the currently playing video's title immediately
    try {
      const data = player.getVideoData();
      if (data.title && data.video_id) plTitleCache[data.video_id] = data.title;
    } catch (_) {}
    showPlaylistPanel();
    const idx = player.getPlaylistIndex?.() || 0;
    document.getElementById('plPanelCount').textContent = (idx + 1) + ' / ' + ids.length + ' tracks';
    renderPlaylistTracks();
    fetchTitlesBatch(ids, idx);
  } catch (_) {
    if (retries < 10) setTimeout(() => buildPlaylistTracks(retries + 1), 500);
  }
}

function renderPlaylistTracks() {
  const container = document.getElementById('playlistTracks');
  let activeIdx = -1;
  try { activeIdx = player.getPlaylistIndex(); } catch (_) {}

  container.innerHTML = plTracks.map((t, i) => {
    const isActive = i === activeIdx;
    const title = plTitleCache[t.id] || t.title || 'Loading…';
    const titleClass = (plTitleCache[t.id] || t.title) ? '' : ' loading';
    return `<div class="pl-track${isActive ? ' active' : ''}" onclick="jumpToTrack(${i})">
      <span class="pl-track-num">${i + 1}</span>
      <img class="pl-track-thumb" src="https://i.ytimg.com/vi/${t.id}/default.jpg" alt="" loading="lazy">
      <span class="pl-track-title${titleClass}">${title.replace(/</g,'&lt;')}</span>
    </div>`;
  }).join('');

  // Auto-scroll active track into view
  const active = container.querySelector('.pl-track.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function jumpToTrack(index) {
  try {
    if (!playlistMode) {
      playlistMode = true;
      updatePlaylistBtn();
    }
    player.playVideoAt(index);
  } catch (_) {}
}

function updatePlaylistTrackHighlight() {
  if (!plBuilt || !plTracks.length) return;
  try {
    const idx = player.getPlaylistIndex();
    document.getElementById('plPanelCount').textContent =
      (idx + 1) + ' / ' + plTracks.length + ' tracks';
  } catch (_) {}
  renderPlaylistTracks();
}

function loadPlaylist(listId) {
  if (!ready || !player) { pendingAutoPlay = 'playlist:' + listId; toast('⏳ Player loading, will play shortly…'); return; }
  stopProgressUpdate();
  stopAbMonitor();

  currentPlaylistId = listId;
  playlistMode      = true;
  libQueue  = null;
  libQueueIdx = -1;
  curId     = null;
  curTitle  = '';
  autoSaved = false;
  duration  = 0;
  loopA     = null;
  loopB     = null;
  sessLoops = 0;
  plBuilt   = false;
  plTracks  = [];
  document.getElementById('sessCount').textContent  = '0';
  document.getElementById('totalCount').textContent = '0';
  document.getElementById('vidTitle').textContent   = 'Loading playlist…';
  updateAbBar();
  updatePlaylistBtn();

  const ph = document.getElementById('placeholder');
  ph.style.display = 'flex';
  ph.innerHTML = `<div class="big-icon" style="animation:spin 1s linear infinite">⏳</div><p>Loading playlist…</p>`;

  player.loadPlaylist({ list: listId, listType: 'playlist', index: 0 });
  localStorage.setItem(LAST_PLAYED_KEY, 'playlist:' + listId);
}

// ── YouTube IFrame API ─────────────────────────────────────────────────────

function createPlayer() {
  if (player) return;                       // already created
  player = new YT.Player('yt-player', {
    height: '100%',
    width:  '100%',
    playerVars: { rel: 0, modestbranding: 1 },
    events: {
      onReady: () => {
        ready = true;
        if (pendingAutoPlay) {
          const p = pendingAutoPlay; const wasDef = isDefaultVideo; pendingAutoPlay = null;
          // Try unmuted autoplay first
          p.startsWith('playlist:') ? loadPlaylist(p.slice('playlist:'.length)) : playVideo(p, false, wasDef);
        } else {
          tryAutoPlay();
        }
      },
      onStateChange: onState,
      onError:       onPlayerError,
    },
  });
}
window.onYouTubeIframeAPIReady = createPlayer;
// If the API loaded before we defined the callback (cached F5 reload), create now
if (typeof YT !== 'undefined' && YT.Player) createPlayer();


function onPlayerError(e) {
  const reasons = {
    2:   'Invalid video ID.',
    5:   'This video cannot play in the HTML5 player.',
    100: 'Video not found or has been removed from YouTube.',
    101: 'The video owner has disabled embedding on third-party sites.',
    150: 'The video owner has disabled embedding on third-party sites.',
  };
  const msg          = reasons[e.data] || `Playback error (code ${e.data}).`;
  const isEmbedBlock = e.data === 101 || e.data === 150;
  const ph           = document.getElementById('placeholder');
  ph.style.display   = 'flex';
  ph.innerHTML = `
    <div class="big-icon">⚠️</div>
    <p style="color:#ef4444;font-weight:600;text-align:center;padding:0 20px">${msg}</p>
    ${isEmbedBlock && curId
      ? `<a href="https://www.youtube.com/watch?v=${curId}" target="_blank"
            style="color:var(--accent);font-size:0.85rem;margin-top:6px;text-decoration:none">
           Open on YouTube ↗
         </a>`
      : ''}
    <p style="font-size:0.78rem;color:var(--muted);margin-top:8px;text-align:center;padding:0 20px">
      Try a different video — many music videos disable third-party embedding.
    </p>
  `;
  document.getElementById('vidTitle').textContent = '⚠️ Cannot play this video';
}

// ── A/B helpers ────────────────────────────────────────────────────────────
function fmtTime(s) {
  if (s === null || s === undefined || isNaN(s)) return '—';
  const m = Math.floor(s / 60);
  return `${m}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
}

function updateAbBar() {
  const pctA = duration > 0 && loopA !== null ? (loopA / duration) * 100 : 0;
  const pctB = duration > 0 && loopB !== null ? (loopB / duration) * 100 : 100;
  document.getElementById('handleA').style.left  = `${pctA}%`;
  document.getElementById('handleB').style.left  = `${pctB}%`;
  document.getElementById('abRange').style.left  = `${pctA}%`;
  document.getElementById('abRange').style.right = `${100 - pctB}%`;
  document.getElementById('abTimeA').textContent = fmtTime(loopA ?? 0);
  document.getElementById('abTimeB').textContent = duration > 0 ? fmtTime(loopB ?? duration) : '—';
}

function startProgressUpdate() {
  stopProgressUpdate();
  const ph = document.getElementById('abPlayhead');
  function tick() {
    if (player && duration > 0) {
      try { ph.style.left = `${(player.getCurrentTime() / duration) * 100}%`; } catch (_) {}
    }
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

function stopProgressUpdate() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

function countLoop() {
  sessLoops++;
  document.getElementById('sessCount').textContent = sessLoops;
  const now = Date.now();
  if (serverLibCache !== null) {
    if (!serverLibCache[curId]) {
      // Entry not yet saved — create it now so the count isn't lost
      const _plId = currentPlaylistId || null;
      serverLibCache[curId] = { title: curTitle || 'Unknown', loops: 0, addedAt: now, lastPlayedAt: now, loopA, loopB, playlistId: _plId };
      api('POST', { videoId: curId, title: curTitle || 'Unknown', loops: 0, addedAt: new Date(now).toISOString(), lastPlayedAt: new Date(now).toISOString(), loopA, loopB, playlistId: _plId }).catch(() => {});
      autoSaved = true;
    }
    serverLibCache[curId].loops = (serverLibCache[curId].loops || 0) + 1;
    serverLibCache[curId].lastPlayedAt = now;
    document.getElementById('totalCount').textContent = serverLibCache[curId].loops;
    api('PATCH', { videoId: curId, incLoops: true, lastPlayedAt: new Date(now).toISOString() }).catch(() => {});
  } else {
    const lib = loadLib();
    if (!lib[curId]) {
      // Entry not yet saved — create it now
      lib[curId] = { title: curTitle || 'Unknown', loops: 0, addedAt: now, lastPlayedAt: now, loopA, loopB, playlistId: currentPlaylistId || null };
      autoSaved = true;
    }
    lib[curId].loops = (lib[curId].loops || 0) + 1;
    lib[curId].lastPlayedAt = now;
    saveLib(lib);
    document.getElementById('totalCount').textContent = lib[curId].loops;
  }
  renderLib();
}

function startAbMonitor() {
  stopAbMonitor();
  if (loopB === null) return;
  abInterval = setInterval(() => {
    if (!player || !curId) return;
    try {
      if (player.getCurrentTime() >= loopB - 0.15) {
        lastCountedEnd = { id: curId, time: Date.now() };
        countLoop();
        if (looping) {
          player.seekTo(loopA ?? 0, true);
        } else {
          // Boundary reached with loop off — advance to next video
          stopAbMonitor();
          advanceToNext();
        }
      }
    } catch (_) {}
  }, 200);
}

function stopAbMonitor() {
  if (abInterval) { clearInterval(abInterval); abInterval = null; }
}

function saveAbToLib() {
  if (!curId) return;
  // Setting A/B points is an explicit user action — clear default flag and persist
  if (isDefaultVideo) {
    isDefaultVideo = false;
    localStorage.setItem(LAST_PLAYED_KEY, curId);
  }
  if (serverLibCache !== null) {
    if (serverLibCache[curId]) {
      serverLibCache[curId].loopA = loopA;
      serverLibCache[curId].loopB = loopB;
      api('PATCH', { videoId: curId, loopA, loopB }).catch(() => {});
    } else {
      const _plId = currentPlaylistId || null;
      api('POST', { videoId: curId, title: curTitle || 'Unknown', loops: 0, addedAt: new Date().toISOString(), loopA, loopB, playlistId: _plId }).catch(() => {});
      serverLibCache[curId] = { title: curTitle || 'Unknown', loops: 0, addedAt: Date.now(), loopA, loopB, playlistId: _plId };
      renderLib();
    }
  } else {
    const lib = loadLib();
    if (lib[curId]) {
      lib[curId].loopA = loopA; lib[curId].loopB = loopB; saveLib(lib);
    } else {
      lib[curId] = { title: curTitle || 'Unknown', loops: 0, addedAt: Date.now(), loopA, loopB, playlistId: currentPlaylistId || null };
      saveLib(lib);
      renderLib();
    }
  }
}

function initAbBar() {
  const bar = document.getElementById('abBar');

  function pctFromEvent(e) {
    const rect = bar.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    return Math.max(0, Math.min(1, x / rect.width));
  }

  function makeDraggable(handle, isA) {
    let dragging = false;
    function onDown(e) {
      if (!duration) return;
      dragging = true;
      e.preventDefault();
      e.stopPropagation();
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend',  onUp);
    }
    function onMove(e) {
      if (!dragging) return;
      e.preventDefault();
      const t = pctFromEvent(e) * duration;
      if (isA) {
        if (loopB !== null && t >= loopB - 1) return;
        loopA = Math.round(t * 10) / 10;
      } else {
        if (loopA !== null && t <= loopA + 1) return;
        loopB = Math.round(t * 10) / 10;
      }
      updateAbBar();
      startAbMonitor();
    }
    function onUp() {
      if (!dragging) return;
      dragging = false;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend',  onUp);
      saveAbToLib();
    }
    handle.addEventListener('mousedown',  onDown);
    handle.addEventListener('touchstart', onDown, { passive: false });
  }

  makeDraggable(document.getElementById('handleA'), true);
  makeDraggable(document.getElementById('handleB'), false);

  // Click bar to seek (not on handles)
  bar.addEventListener('click', e => {
    if (!duration || !player) return;
    if (e.target.classList.contains('ab-handle')) return;
    player.seekTo(pctFromEvent(e) * duration, true);
  });
}

function advanceToNext() {
  if (playlistMode && currentPlaylistId) {
    const pl = player.getPlaylist?.();
    const idx = player.getPlaylistIndex?.();
    if (pl && idx !== undefined && idx >= pl.length - 1) {
      player.playVideoAt(0);
    } else {
      player.nextVideo();
    }
  } else {
    // Play next song from library queue
    if (!libQueue) {
      const lib = loadLib();
      libQueue = Object.entries(lib)
        .sort((a, b) => (b[1].lastPlayedAt || b[1].addedAt) - (a[1].lastPlayedAt || a[1].addedAt))
        .map(([id]) => id);
      libQueueIdx = libQueue.indexOf(curId);
    }
    if (libQueue.length > 1) {
      libQueueIdx = (libQueueIdx + 1) % libQueue.length;
      playVideo(libQueue[libQueueIdx], false, false, true);
    }
  }
}

function onState(e) {
  if (e.data === YT.PlayerState.PLAYING) {
    document.getElementById('placeholder').style.display = 'none';
    try { if (!duration) { duration = player.getDuration(); updateAbBar(); } } catch (_) {}
    // Set max available quality
    try {
      const levels = player.getAvailableQualityLevels();
      if (levels && levels.length) player.setPlaybackQuality(levels[0]);
    } catch (_) {}
    startProgressUpdate();
    startAbMonitor();

    if (playlistMode) {
      try {
        const data = player.getVideoData();
        if (data.video_id && data.video_id !== curId) {
          // Track changed — count the completed play of the previous video
          if (curId) {
            lastCountedEnd = { id: curId, time: Date.now() };
            countLoop();
          }
          curId     = data.video_id;
          curTitle  = data.title || '';
          autoSaved = false;
          duration  = player.getDuration() || 0;
          sessLoops = 0;
          document.getElementById('sessCount').textContent = '0';
          const lib   = loadLib();
          const entry = lib[curId];
          loopA = entry?.loopA ?? null;
          loopB = entry?.loopB ?? null;
          document.getElementById('totalCount').textContent = entry?.loops || 0;
          updateAbBar();
          // Seek to boundary A and restart A/B monitor with restored boundaries
          if (loopA) { try { player.seekTo(loopA, true); } catch (_) {} }
          startAbMonitor();
          localStorage.setItem(LAST_PLAYED_KEY, 'playlist:' + currentPlaylistId);
          // Cache title from player data
          if (data.title) plTitleCache[data.video_id] = data.title;
        }
      } catch (_) {}
      // Build tracklist on first play, update highlight on subsequent plays
      if (!plBuilt) buildPlaylistTracks();
      else updatePlaylistTrackHighlight();
    }

    setTimeout(async () => {
      try {
        const t = player.getVideoData().title;
        if (!duration) { duration = player.getDuration(); updateAbBar(); }
        if (t) {
          curTitle = t;
          document.getElementById('vidTitle').textContent = t;
          // Update playlist panel title cache + re-render if needed
          if (curId && !plTitleCache[curId]) {
            plTitleCache[curId] = t;
            if (plBuilt) renderPlaylistTracks();
          }
          if (serverLibCache !== null && serverLibCache[curId]?.title === 'Unknown') {
            serverLibCache[curId].title = t;
            api('PATCH', { videoId: curId, title: t }).catch(() => {});
          } else if (serverLibCache === null) {
            const lib = loadLib();
            if (lib[curId] && lib[curId].title === 'Unknown') { lib[curId].title = t; saveLib(lib); }
          }
        }
      } catch (_) {}

      if (!autoSaved && curId && !isDefaultVideo) {
        autoSaved = true;
        const lib = loadLib();
        if (!lib[curId]) {
          if (serverLibCache !== null) {
            try {
              const _plId = currentPlaylistId || null;
              const _now = Date.now();
              await api('POST', {
                videoId:  curId,
                title:    curTitle || 'Unknown',
                loops:    0,
                addedAt:  new Date(_now).toISOString(),
                lastPlayedAt: new Date(_now).toISOString(),
                loopA,
                loopB,
                playlistId: _plId,
              });
              serverLibCache[curId] = { title: curTitle || 'Unknown', loops: 0, addedAt: _now, lastPlayedAt: _now, loopA, loopB, playlistId: _plId };
            } catch (_) {}
          } else {
            const lib2 = loadLib();
            if (!lib2[curId]) {
              const _now2 = Date.now();
              lib2[curId] = { title: curTitle || 'Unknown', loops: 0, addedAt: _now2, lastPlayedAt: _now2, loopA, loopB, playlistId: currentPlaylistId || null };
              saveLib(lib2);
            }
          }
          renderLib();
        } else if (currentPlaylistId && !lib[curId].playlistId) {
          // Video already in library but now played from a playlist — attach playlistId
          if (serverLibCache !== null) {
            try {
              await api('PATCH', { videoId: curId, playlistId: currentPlaylistId });
              serverLibCache[curId].playlistId = currentPlaylistId;
            } catch (_) {}
          } else {
            const lib2 = loadLib();
            lib2[curId].playlistId = currentPlaylistId;
            saveLib(lib2);
          }
          renderLib();
        }
      }
    }, 800);
  }

  if (e.data === YT.PlayerState.PAUSED) {
    stopProgressUpdate();
    stopAbMonitor();
  }

  if (e.data === YT.PlayerState.ENDED && curId) {
    // Count a completed play-through — skip if already counted via playlist track change or A/B boundary
    const alreadyCounted = lastCountedEnd && lastCountedEnd.id === curId && (Date.now() - lastCountedEnd.time) < 2000;
    if (!alreadyCounted) countLoop();
    if (looping) {
      player.seekTo(loopA ?? 0, true);
      player.playVideo();
    } else {
      advanceToNext();
    }
  }
}

// ── Play video ─────────────────────────────────────────────────────────────
function playVideo(id, keepPlaylist, _isDefault, _keepQueue) {
  if (!ready || !player) { pendingAutoPlay = id; toast('⏳ Player loading, will play shortly…'); return; }
  isDefaultVideo = !!_isDefault;
  stopProgressUpdate();
  stopAbMonitor();

  // Reset library queue on manual user navigation
  if (!_keepQueue) { libQueue = null; libQueueIdx = -1; }

  // Exit playlist mode when playing a standalone video
  if (!keepPlaylist && (playlistMode || currentPlaylistId)) {
    playlistMode = false;
    currentPlaylistId = null;
    plBuilt = false;
    plTracks = [];
    updatePlaylistBtn();
    hidePlaylistPanel();
  }

  curId     = id;
  sessLoops = 0;
  curTitle  = '';
  autoSaved = false;
  duration  = 0;
  document.getElementById('sessCount').textContent = '0';

  const lib = loadLib();
  const entry = lib[id];
  loopA = entry?.loopA ?? null;
  loopB = entry?.loopB ?? null;
  updateAbBar();

  // Update lastPlayedAt for existing entries
  if (entry && !_isDefault) {
    const now = Date.now();
    if (serverLibCache !== null && serverLibCache[id]) {
      serverLibCache[id].lastPlayedAt = now;
      api('PATCH', { videoId: id, lastPlayedAt: new Date(now).toISOString() }).catch(() => {});
    } else {
      entry.lastPlayedAt = now;
      saveLib(lib);
    }
  }

  const total = entry ? (entry.loops || 0) : 0;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('vidTitle').textContent   = entry?.title || 'Loading…';

  const ph = document.getElementById('placeholder');
  ph.style.display = 'flex';
  ph.innerHTML = `<div class="big-icon" style="animation:spin 1s linear infinite">⏳</div><p>Loading…</p>`;

  if (!isDefaultVideo) {
    localStorage.setItem(LAST_PLAYED_KEY, id);
  }
  player.loadVideoById(id, loopA ?? 0);
  renderLib();
}

function tryAutoPlay() {
  if (autoPlayDone) return;
  autoPlayDone = true;
  let last = localStorage.getItem(LAST_PLAYED_KEY);
  let useDefault = false;
  if (!last) {
    useDefault = true;
    last = 'xMV6l2y67rk';
  }
  const isPlaylist = last.startsWith('playlist:');
  const id = isPlaylist ? last.slice('playlist:'.length) : last;
  if (ready && player) {
    // Try unmuted autoplay; browser may block it — handled in onState fallback
    isPlaylist ? loadPlaylist(id) : playVideo(id, false, useDefault);
  } else {
    pendingAutoPlay = last;
    if (useDefault) isDefaultVideo = true;
  }
}

// ── UI handlers ────────────────────────────────────────────────────────────
function handlePlay() {
  const raw    = document.getElementById('urlInput').value.trim();
  const listId = extractPlaylistId(raw);
  const vidId  = extractId(raw);

  if (!listId && !vidId) { toast('⚠️ Could not find a YouTube video or playlist URL'); return; }
  document.getElementById('urlInput').value = '';

  if (listId && vidId) {
    if (listId.startsWith('RD')) {
      // Radio/Mix playlists: play the specific video, keep playlist context
      currentPlaylistId = listId;
      playlistMode      = false;
      updatePlaylistBtn();
      playVideo(vidId);
      return;
    }
    // Regular playlists: load the full playlist
    loadPlaylist(listId);
    return;
  } else if (listId) {
    loadPlaylist(listId);
  } else {
    currentPlaylistId = null;
    playlistMode      = false;
    updatePlaylistBtn();
    hidePlaylistPanel();
    plBuilt = false;
    plTracks = [];
    playVideo(vidId);
  }
}

document.getElementById('playBtn').addEventListener('click', handlePlay);
document.getElementById('urlInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') handlePlay();
});

document.getElementById('loopBtn').addEventListener('click', function () {
  looping = !looping;
  this.textContent = looping ? '🔁 Loop ON' : '➡️ Loop OFF';
  this.classList.toggle('on', looping);
  toast(looping ? 'Loop enabled' : 'Loop disabled');
});

document.getElementById('playlistBtn').addEventListener('click', function () {
  if (!currentPlaylistId) { toast('Paste a YouTube playlist URL first'); return; }
  playlistMode = !playlistMode;
  updatePlaylistBtn();

  if (playlistMode) {
    // If the player doesn't have a playlist loaded yet (e.g. we played a single video
    // from a URL that had both v= and list=), load the playlist starting at the current video
    try {
      const plIndex = player.getPlaylistIndex?.();
      if (plIndex === undefined || plIndex === -1 || !player.getPlaylist?.()?.length) {
        player.loadPlaylist({ list: currentPlaylistId, listType: 'playlist', index: 0 });
        toast('▶ Loading playlist…');
        return;
      }
    } catch (_) {
      player.loadPlaylist({ list: currentPlaylistId, listType: 'playlist', index: 0 });
      toast('▶ Loading playlist…');
      return;
    }
  }

  if (playlistMode) {
    showPlaylistPanel();
    if (plBuilt) updatePlaylistTrackHighlight();
  } else {
    hidePlaylistPanel();
  }

  toast(playlistMode ? '▶ Playlist mode — advancing through tracks' : '🔁 Back to loop mode');
});

// ── Playlist panel header / close button ──
document.getElementById('plPanelHeader').addEventListener('click', (e) => {
  if (e.target.closest('#plPanelClose')) return;
  togglePlaylistPanel();
});
document.getElementById('plPanelClose').addEventListener('click', closePlaylistPanel);

document.getElementById('clearBtn').addEventListener('click', async () => {
  if (!confirm('Clear your entire library?')) return;

  if (serverLibCache !== null) {
    try {
      await api('DELETE', { all: true });
      serverLibCache = {};
    } catch (err) {
      toast('⚠️ Failed to clear. Try again.');
      return;
    }
  } else {
    localStorage.removeItem(STORE_KEY);
  }
  renderLib();
  toast('Library cleared');
});

// ── Reload history button ────────────────────────────────────────────────────
document.getElementById('reloadBtn').addEventListener('click', async () => {
  if (serverLibCache !== null) {
    try {
      await loadLibraryFromAtlas();
      toast('History reloaded');
    } catch (_) {}
  } else {
    renderLib();
    toast('History reloaded from local storage');
  }
});

// ── Sort bar ────────────────────────────────────────────────────────────────
document.getElementById('sortBar').addEventListener('click', (e) => {
  const btn = e.target.closest('.sort-btn');
  if (!btn) return;
  libSortMode = btn.dataset.sort;
  document.querySelectorAll('#sortBar .sort-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderLib();
});

// ── Render library ─────────────────────────────────────────────────────────
function sortLibEntries(list) {
  switch (libSortMode) {
    case 'most-played':
      return list.sort((a, b) => (b[1].loops || 0) - (a[1].loops || 0));
    case 'title':
      return list.sort((a, b) => (a[1].title || '').localeCompare(b[1].title || ''));
    case 'recent':
    default:
      return list.sort((a, b) => (b[1].lastPlayedAt || b[1].addedAt) - (a[1].lastPlayedAt || a[1].addedAt));
  }
}

function renderLib() {
  const el   = document.getElementById('songs');
  const lib  = loadLib();
  const list = sortLibEntries(Object.entries(lib));

  if (!list.length) {
    el.innerHTML = `
      <div class="empty">
        <div class="icon">🎧</div>
        <p>Songs you save will appear here with their play counts</p>
      </div>`;
    document.getElementById('libFooter').style.display = 'none';
    document.getElementById('sortBar').style.display = 'none';
    return;
  }
  document.getElementById('libFooter').style.display = '';
  document.getElementById('sortBar').style.display = 'flex';
  document.getElementById('libRefreshBtn').style.display = serverLibCache !== null ? '' : 'none';

  el.innerHTML = list.map(([id, s]) => `
    <div class="song-row ${id === curId ? 'active' : ''}" onclick="playVideo('${id}')">
      <img class="thumb"
           src="https://img.youtube.com/vi/${id}/mqdefault.jpg"
           alt=""
           onerror="this.style.visibility='hidden'" />
      <div class="song-info">
        <div class="song-name">${esc(s.title)}</div>
        <div class="song-date">${fmtDate(s.lastPlayedAt || s.addedAt)}</div>
      </div>
      <div class="loop-count">
        <span class="num">${s.loops || 0}</span>
        <span class="lbl">counter</span>
      </div>
      ${s.playlistId ? `<button class="btn-playlist-lib" onclick="loadPlaylistFromLib('${s.playlistId}', event)" title="Play source playlist">▶<span class="playlist-lib-label">Start playlist</span></button>` : ''}
      <button class="btn-del" onclick="delSong('${id}', event)" title="Remove">🗑️</button>
    </div>
  `).join('');
}

function loadPlaylistFromLib(listId, e) {
  e.stopPropagation();
  loadPlaylist(listId);
}

async function delSong(id, e) {
  e.stopPropagation();
  if (serverLibCache !== null) {
    try {
      await api('DELETE', { videoId: id });
      delete serverLibCache[id];
    } catch (err) {
      toast('⚠️ Failed to remove. Try again.');
      return;
    }
  } else {
    const lib = loadLib();
    delete lib[id];
    saveLib(lib);
  }
  renderLib();
  toast('Removed from library');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── Init ───────────────────────────────────────────────────────────────────
renderLib();   // render localStorage immediately so library shows while auth loads
initAbBar();
initAuth();
</script>
</body>
</html>
