<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0090ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0090ff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1e1e30"/>
      <stop offset="100%" stop-color="#12121f"/>
    </linearGradient>
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Circular arrows -->
  <g filter="url(#glowFilter)">
    <!-- Top arrow (pointing right) -->
    <path d="M 130 30 A 75 75 0 0 1 170 100" stroke="url(#arrow)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <polygon points="170,88 185,100 168,108" fill="url(#arrow)"/>

    <!-- Right arrow (pointing down) -->
    <path d="M 170 110 A 75 75 0 0 1 100 175" stroke="url(#arrow)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <polygon points="112,175 100,190 88,173" fill="url(#arrow)"/>

    <!-- Bottom arrow (pointing left) -->
    <path d="M 70 170 A 75 75 0 0 1 30 100" stroke="url(#arrow)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <polygon points="30,112 15,100 32,92" fill="url(#arrow)"/>

    <!-- Left arrow (pointing up) -->
    <path d="M 30 90 A 75 75 0 0 1 100 25" stroke="url(#arrow)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <polygon points="88,25 100,10 112,27" fill="url(#arrow)"/>
  </g>

  <!-- Center rounded square -->
  <rect x="62" y="62" width="76" height="76" rx="18" fill="url(#boxGrad)" stroke="#e0e0ff" stroke-width="3" stroke-opacity="0.8"/>

  <!-- Play triangle -->
  <polygon points="90,80 90,120 122,100" fill="#e0e0ff" fill-opacity="0.9"/>
</svg>
